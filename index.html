  <style>

    .right-panel{display:grid;grid-template-rows:54% 46%;min-width:0}.map-panel{display:grid;grid-template-rows:auto auto 1fr;background:radial-gradient(circle at 35% 35%,#edf3ed 0%,#dbe6df 55%,#cbd8d5 100%);border-bottom:1px solid var(--line);overflow:hidden}.map-top{display:flex;align-items:flex-start;gap:10px;padding:13px 16px 9px;background:rgba(255,255,255,.72);border-bottom:1px solid rgba(230,216,202,.72)}.home-btn{border:0;border-radius:999px;background:var(--accent);color:#fff;padding:10px 14px;font-weight:900;font-size:12px;cursor:pointer;white-space:nowrap;box-shadow:0 8px 16px rgba(112,67,49,.18)}.home-btn.active{background:#3f281f}.chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:34px}.chip{display:inline-flex;align-items:center;gap:7px;min-height:34px;padding:7px 11px 7px 8px;border-radius:999px;background:rgba(255,255,255,.94);border:1px solid var(--line);color:var(--accent);font-size:13px;font-weight:850;box-shadow:0 6px 12px rgba(51,35,25,.08)}.num{width:23px;height:23px;border-radius:50%;display:inline-grid;place-items:center;background:var(--accent);color:#fff;font-size:12px;line-height:1;font-weight:950;flex:0 0 23px}.map-caption{margin:0 16px 8px;padding:11px 13px;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:17px;box-shadow:0 10px 20px rgba(0,0,0,.08)}.map-caption strong{display:block;font-size:15px;margin-bottom:3px}.map-caption span{color:var(--muted);font-size:13px}.svg-wrap{min-height:0;overflow:hidden}#routeMap{width:100%;height:100%;display:block}

    @media(max-width:980px){

      .timeline li{grid-template-columns:76px 1fr;gap:8px;font-size:13px;padding:8px 0}

      .chips{max-height:70px}
      .day-row{align-items:flex-start}
      .date{font-size:14px}.country{font-size:11px;text-align:right}
      .timeline li{grid-template-columns:70px 1fr;font-size:12.5px}
    }
  </style>
