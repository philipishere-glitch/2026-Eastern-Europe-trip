<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Europe Trip Dashboard</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #ffffff;
      --ink: #26211d;
      --muted: #6d645d;
      --accent: #704331;
      --accent2: #b36b45;
      --line: #e6d8ca;
      --soft: #f2e8dc;
      --shadow: 0 18px 42px rgba(51, 35, 25, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #faf6ef 0%, #eadccd 100%);
      color: var(--ink);
    }

    header {
      padding: 26px 34px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 0.95;
      letter-spacing: -0.045em;
    }

    .subtitle { margin: 0; color: var(--muted); font-size: 15px; }

    .trip-pill {
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 17px;
      color: var(--accent);
      font-weight: 750;
      box-shadow: var(--shadow);
      white-space: nowrap;
      font-size: 14px;
    }

    .dashboard {
      height: calc(100vh - 112px);
      min-height: 740px;
      padding: 16px 34px 34px;
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .left-panel { display: flex; flex-direction: column; }

    .left-head {
      padding: 21px 22px 14px;
      border-bottom: 1px solid var(--line);
    }

    .left-head h2, .detail h2 {
      margin: 0 0 6px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .left-head p, .detail p { margin: 0; color: var(--muted); font-size: 13px; }

    .day-list { padding: 14px; overflow: auto; }

    .day-card {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 20px;
      background: transparent;
      margin: 0 0 10px;
      padding: 16px;
      text-align: left;
      cursor: pointer;
      color: inherit;
      transition: 0.16s ease;
    }

    .day-card:hover { background: #fffaf5; border-color: var(--line); transform: translateY(-1px); }
    .day-card.active { background: var(--accent); color: white; box-shadow: 0 12px 28px rgba(112,67,49,0.26); }

    .day-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 8px; }
    .date { font-size: 15px; font-weight: 900; }
    .country { font-size: 12px; opacity: 0.76; }
    .day-title { font-size: 16px; font-weight: 850; margin-bottom: 8px; }

    .mini {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .day-card.active .mini, .day-card.active .country { color: rgba(255,255,255,0.82); }

    .right-panel {
      display: grid;
      grid-template-rows: 57% 43%;
      min-width: 0;
    }

    .map-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: radial-gradient(circle at 28% 25%, #edf4ef 0%, #d9e5df 45%, #c9d8d6 100%);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .map-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 16px 9px;
      background: rgba(255,255,255,0.58);
      border-bottom: 1px solid rgba(230,216,202,0.72);
    }

    .home-btn {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 16px rgba(112,67,49,0.18);
    }

    .home-btn.active { background: #3f281f; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; min-height: 34px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 11px 7px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 13px;
      font-weight: 850;
      box-shadow: 0 6px 12px rgba(51,35,25,0.08);
    }

    .num {
      width: 23px;
      height: 23px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: var(--accent);
      color: white;
      font-size: 12px;
      line-height: 1;
      font-weight: 950;
      flex: 0 0 23px;
    }

    .map-caption {
      margin: 0 16px 8px;
      padding: 11px 13px;
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      border-radius: 17px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .map-caption strong { display: block; font-size: 15px; margin-bottom: 3px; }
    .map-caption span { color: var(--muted); font-size: 13px; }

    .svg-wrap { min-height: 0; overflow: hidden; }
    #routeMap { width: 100%; height: 100%; display: block; }

    .country-label { font-size: 19px; fill: rgba(38,33,29,0.30); font-weight: 900; letter-spacing: 0.08em; }
    .base-route { stroke: rgba(112,67,49,0.15); stroke-width: 5; fill: none; stroke-dasharray: 12 12; stroke-linecap: round; }
    .route-bg { stroke: white; stroke-width: 22; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.88; }
    .route-line { stroke: var(--accent2); stroke-width: 13; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 7px 8px rgba(112,67,49,0.22)); }
    .marker-main { fill: var(--accent); stroke: white; stroke-width: 7; }
    .marker-mid { fill: #fff6ed; stroke: var(--accent2); stroke-width: 6; }
    .marker-text { fill: white; font-size: 20px; font-weight: 950; text-anchor: middle; dominant-baseline: central; }
    .marker-mid + .marker-text { fill: var(--accent); }
    .ghost-dot { fill: rgba(112,67,49,0.24); }
    .full-dot { fill: rgba(112,67,49,0.55); }

    .detail {
      padding: 24px 28px;
      overflow: auto;
      background: linear-gradient(180deg, #fff 0%, #fffaf5 100%);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .box {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
    }

    .box h3 {
      margin: 0 0 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .timeline { list-style: none; padding: 0; margin: 0; }
    .timeline li {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px dashed rgba(112,67,49,0.18);
      font-size: 14px;
      line-height: 1.35;
    }
    .timeline li:last-child { border-bottom: 0; }
    .time { color: var(--accent); font-weight: 900; }

    .notes { margin: 0; padding-left: 18px; color: var(--muted); font-size: 14px; line-height: 1.5; }

    table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 13px; border-radius: 14px; overflow: hidden; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: var(--accent); color: white; }
    tr:last-child td { border-bottom: 0; }

    @media (max-width: 980px) {
      header { flex-direction: column; align-items: flex-start; }
      .trip-pill { white-space: normal; }
      .dashboard { grid-template-columns: 1fr; height: auto; min-height: 0; }
      .right-panel { min-height: 900px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Central Europe Road Trip</h1>
      <p class="subtitle">May 7–14, 2026 · Prague → Vienna → Slovenia → Zagreb → Budapest</p>
    </div>
    <div class="trip-pill">4 adults · Self-drive · Opera House May 12 · Tihany removed</div>
  </header>

  <main class="dashboard">
    <section class="panel left-panel">
      <div class="left-head">
        <h2>Trip days</h2>
        <p>Select a day to zoom into its route and show the detailed plan.</p>
      </div>
      <div class="day-list" id="dayList"></div>
    </section>

    <section class="panel right-panel">
      <div class="map-panel">
        <div class="map-top">
          <button class="home-btn" id="homeBtn" type="button">Full Route</button>
          <div class="chips" id="chips"></div>
        </div>
        <div class="map-caption">
          <strong id="mapTitle"></strong>
          <span id="mapText"></span>
        </div>
        <div class="svg-wrap">
          <svg id="routeMap" viewBox="80 80 740 470" preserveAspectRatio="xMidYMid meet" aria-label="Trip route map">
            <g id="mapLayer" transform="translate(0,55)">
              <text x="95" y="55" class="country-label">CZECHIA</text>
              <text x="286" y="152" class="country-label">AUSTRIA</text>
              <text x="412" y="334" class="country-label">SLOVENIA</text>
              <text x="614" y="486" class="country-label">CROATIA</text>
              <text x="735" y="210" class="country-label">HUNGARY</text>
              <path id="baseRoute" class="base-route"></path>
              <path id="routeBg" class="route-bg"></path>
              <path id="routeLine" class="route-line"></path>
              <g id="markers"></g>
            </g>
          </svg>
        </div>
      </div>

      <div class="detail">
        <h2 id="detailTitle"></h2>
        <p id="detailMeta"></p>
        <div class="detail-grid">
          <div class="box">
            <h3>Hour-by-hour</h3>
            <ul class="timeline" id="timeline"></ul>
          </div>
          <div class="box">
            <h3>Hotel / meal notes</h3>
            <ul class="notes" id="notes"></ul>
            <table id="mealTable"></table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const locations = {
      "Prague Airport": { x: 150, y: 102, label: "PRG Airport" },
      "Prague": { x: 170, y: 122, label: "Prague" },
      "Mikulov": { x: 310, y: 210, label: "Mikulov" },
      "Vienna": { x: 390, y: 238, label: "Vienna" },
      "Bled": { x: 455, y: 356, label: "Bled" },
      "Ljubljana": { x: 498, y: 393, label: "Ljubljana" },
      "Postojna": { x: 468, y: 426, label: "Postojna" },
      "Piran": { x: 415, y: 462, label: "Piran" },
      "Zagreb": { x: 605, y: 432, label: "Zagreb" },
      "Budapest Airport": { x: 750, y: 275, label: "BUD Airport" },
      "Budapest": { x: 724, y: 245, label: "Budapest" },
      "Opera House": { x: 714, y: 257, label: "Opera" }
    };

    const fullRoute = ["Prague Airport", "Prague", "Mikulov", "Vienna", "Bled", "Ljubljana", "Postojna", "Piran", "Zagreb", "Budapest Airport", "Budapest"];

    const days = [
      { date: "Thu May 7", country: "Czech Republic", title: "Arrive in Prague", route: ["Prague Airport", "Prague"], routeText: "Prague Airport → The Grand Mark Prague → Old Town → Charles Bridge", bullets: ["Arrive PRG 10:50", "Old Town + Charles Bridge", "$200 hotel credit for dinner"], meta: "Hotel: The Grand Mark Prague · Breakfast included next morning · Use $200 credit for dinner", timeline: [["10:50", "Land at Prague Airport"], ["11:30–12:15", "Immigration and baggage"], ["12:15–13:00", "Transfer to The Grand Mark Prague"], ["13:00–14:00", "Check in or luggage drop"], ["14:00–15:00", "Light lunch near Old Town"], ["15:00–16:30", "Old Town Square and Astronomical Clock"], ["16:30–17:30", "Walk to Charles Bridge"], ["17:30–18:30", "Malá Strana stroll and Prague Castle exterior views"], ["18:30–20:00", "Dinner using the $200 hotel credit"], ["21:30", "Early night before driving day"]], notes: ["Only one night in Prague, so keep sightseeing iconic and compact.", "Do not pick up the car until May 8."], meals: [["Breakfast", "Included on May 8"], ["Credit", "$200 for May 7 dinner"]] },
      { date: "Fri May 8", country: "Czech Republic → Austria", title: "Prague → Mikulov → Vienna", route: ["Prague Airport", "Mikulov", "Vienna"], routeText: "Prague Airport → Mikulov → Andaz Vienna Am Belvedere", bullets: ["Car pickup 12:00 at PRG", "Mikulov wine-region stop", "Arrive Vienna evening"], meta: "Hotel: Andaz Vienna Am Belvedere · 1st of 2 Vienna nights · $200 credit available", timeline: [["08:00", "Breakfast at The Grand Mark Prague"], ["09:00–10:00", "Short final Prague walk, optional"], ["10:00–10:45", "Taxi to Prague Airport"], ["11:00–12:00", "Car pickup paperwork"], ["12:00", "Depart Prague Airport"], ["14:30", "Arrive Mikulov"], ["14:30–16:30", "Mikulov castle area, vineyard views, late lunch / coffee"], ["16:30", "Depart Mikulov"], ["18:00–18:30", "Arrive Andaz Vienna Am Belvedere"], ["18:30–19:30", "Check in and refresh"], ["19:30–21:00", "Dinner in Vienna; use credit if desired"]], notes: ["Keep Mikulov to 2 hours so Vienna arrival stays comfortable.", "Check whether Vienna breakfast is included; credit can cover breakfast or dinner."], meals: [["Breakfast", "Prague included"], ["Vienna breakfast", "Pending confirmation"], ["Credit", "$200 at Vienna"]] },
      { date: "Sat May 9", country: "Austria", title: "Vienna full day", route: ["Vienna"], routeText: "Schönbrunn → Belvedere → St. Stephen’s Cathedral → Vienna center", bullets: ["Schönbrunn Palace", "Belvedere / Klimt", "Coffeehouse + dinner"], meta: "Hotel: Andaz Vienna Am Belvedere · 2nd Vienna night", timeline: [["08:00", "Breakfast — hotel if included, otherwise use credit if preferred"], ["09:00–11:30", "Schönbrunn Palace and gardens"], ["11:30–12:15", "Coffee or snack"], ["12:15–13:00", "Travel back toward center"], ["13:00–14:00", "Lunch near Naschmarkt or city center"], ["14:00–16:00", "Belvedere Palace / Klimt"], ["16:00–17:30", "St. Stephen’s Cathedral, Graben, Kärntner Straße"], ["17:30–18:30", "Café Central, Demel, or Sacher-style coffee break"], ["19:00–21:00", "Dinner; good use of credit if breakfast is included"], ["21:00", "Optional concert or relaxed walk"]], notes: ["This is the most classic cultural day of the trip.", "Book Schönbrunn early-entry tickets if available."], meals: [["Breakfast", "Pending confirmation"], ["Credit", "Use for breakfast if needed, otherwise dinner"]] },
      { date: "Sun May 10", country: "Austria → Slovenia", title: "Vienna → Lake Bled → Ljubljana", route: ["Vienna", "Bled", "Ljubljana"], routeText: "Vienna → Lake Bled → Ljubljana", bullets: ["Drive directly to Bled", "Castle + lake views", "Evening Ljubljana stroll"], meta: "Hotel: Ljubljana hotel TBD · Breakfast included next morning", timeline: [["07:30", "Breakfast"], ["08:15", "Check out"], ["08:30", "Depart Vienna"], ["12:45–13:00", "Arrive Lake Bled"], ["13:00–14:00", "Lunch / Bled cream cake"], ["14:00–15:30", "Bled Castle viewpoint"], ["15:30–16:30", "Lakeside walk or boat to island"], ["16:30", "Depart Bled"], ["17:30–18:00", "Arrive Ljubljana"], ["18:00–19:00", "Check in and park"], ["19:00–20:30", "Dinner along Ljubljanica River"], ["20:30–21:30", "Triple Bridge, Prešeren Square, old town stroll"]], notes: ["This is a scenic but manageable driving day.", "Keep Bled focused so Ljubljana does not become too late."], meals: [["Breakfast", "Vienna, pending confirmation"], ["Ljubljana breakfast", "Included on May 11"]] },
      { date: "Mon May 11", country: "Slovenia → Croatia", title: "Ljubljana → Postojna → Piran → Zagreb", route: ["Ljubljana", "Postojna", "Piran", "Zagreb"], routeText: "Ljubljana → Postojna Cave → Piran → Best Western Premier Hotel Astoria Zagreb", bullets: ["Postojna Cave tour", "Piran seafood + old town", "Arrive Zagreb evening"], meta: "Hotel: Best Western Premier Hotel Astoria · Zagreb breakfast included next morning", timeline: [["07:00", "Breakfast at Ljubljana hotel"], ["07:45", "Check out"], ["08:00", "Depart Ljubljana"], ["08:45", "Arrive Postojna Cave parking"], ["09:00–09:30", "Ticket pickup, coffee, restroom"], ["09:30–11:00", "Postojna Cave tour"], ["11:00–11:30", "Exit, snack, souvenir stop"], ["11:30", "Depart Postojna"], ["13:00", "Arrive Piran parking area"], ["13:00–13:30", "Shuttle or walk into Piran old town"], ["13:30–14:45", "Seafood lunch near harbor"], ["14:45–16:15", "Tartini Square, harbor, old town lanes, city walls"], ["16:30", "Depart Piran"], ["19:00–19:30", "Arrive Zagreb hotel"], ["20:15–21:30", "Easy dinner near hotel or Ban Jelačić Square"]], notes: ["Book Postojna Cave for 09:30 or 10:00.", "Do not add Predjama Castle unless you shorten Piran."], meals: [["Breakfast", "Ljubljana included"], ["Zagreb breakfast", "Included on May 12"]] },
      { date: "Tue May 12", country: "Croatia → Hungary", title: "Zagreb → Budapest + Opera House", route: ["Zagreb", "Budapest Airport", "Budapest", "Opera House"], routeText: "Zagreb → Budapest Airport car return → Mystery Hotel Budapest → Hungarian State Opera House", bullets: ["Morning Zagreb walk", "Return car before 18:00", "Opera House at 18:00"], meta: "Hotel: Mystery Hotel Budapest · Breakfast not included · Car return ideally 15:30–16:00", timeline: [["07:30", "Breakfast at Zagreb hotel"], ["08:15", "Walk or short taxi to Zagreb center"], ["08:30–09:15", "Ban Jelačić Square and Dolac Market"], ["09:15–10:15", "Upper Town and St. Mark’s Church"], ["10:15–10:45", "Coffee stop"], ["10:45–11:15", "Return to hotel, collect bags"], ["11:15–11:30", "Check out"], ["11:30", "Depart Zagreb"], ["13:30–14:00", "Roadside lunch / fuel stop"], ["15:30–16:00", "Arrive Budapest Airport and return car"], ["16:00–16:45", "Taxi/Bolt to Mystery Hotel Budapest"], ["16:45–17:15", "Check in and quick refresh"], ["17:15", "Leave hotel for Hungarian State Opera House"], ["17:35–17:45", "Arrive Opera House"], ["18:00", "Budapest State Opera House visit"], ["19:30–21:00", "Dinner near Andrássy Avenue / Jewish Quarter"]], notes: ["Tihany is removed to protect the 18:00 Opera House timing.", "Return the car early even though the original rental time may be later."], meals: [["Breakfast", "Zagreb included"], ["Budapest breakfast", "Not included"]] },
      { date: "Wed May 13", country: "Hungary", title: "Budapest full day", route: ["Budapest"], routeText: "Mystery Hotel Budapest → Buda Castle → Fisherman’s Bastion → Parliament → Baths", bullets: ["Café breakfast", "Buda Castle + Fisherman’s Bastion", "Baths or Jewish Quarter"], meta: "Hotel: Mystery Hotel Budapest · Breakfast not included", timeline: [["08:00", "Café breakfast near hotel"], ["09:00–11:30", "Buda Castle Hill, Fisherman’s Bastion, Matthias Church"], ["11:30–12:30", "Coffee / cake stop"], ["12:30–13:30", "Lunch"], ["13:30–15:30", "Parliament exterior and Danube promenade"], ["15:30–17:30", "Széchenyi Thermal Baths or Gellért Baths"], ["18:00–19:00", "Rest at hotel"], ["19:30–21:00", "Dinner"], ["21:00–22:00", "Optional ruin bar or evening walk"]], notes: ["This is your main Budapest sightseeing day.", "Book bath tickets ahead if that is a priority."], meals: [["Breakfast", "Not included — plan café"], ["Dinner", "Flexible"]] },
      { date: "Thu May 14", country: "Hungary", title: "Budapest departure", route: ["Budapest", "Budapest Airport"], routeText: "Mystery Hotel Budapest → Budapest Airport", bullets: ["Early airport transfer", "07:40 flight", "Airport breakfast/snack"], meta: "Flight departs Budapest at 07:40 · No hotel breakfast needed", timeline: [["04:45", "Wake up"], ["05:15", "Leave hotel for airport"], ["05:45–06:00", "Arrive Budapest Airport"], ["07:40", "Flight departs"]], notes: ["Arrange taxi the night before.", "Plan airport coffee/snack because hotel breakfast is not included and departure is very early."], meals: [["Breakfast", "Airport coffee/snack"], ["Hotel", "Mystery Hotel Budapest checkout"]] }
    ];

    const dayList = document.getElementById("dayList");
    const chips = document.getElementById("chips");
    const homeBtn = document.getElementById("homeBtn");
    const mapTitle = document.getElementById("mapTitle");
    const mapText = document.getElementById("mapText");
    const detailTitle = document.getElementById("detailTitle");
    const detailMeta = document.getElementById("detailMeta");
    const timeline = document.getElementById("timeline");
    const notes = document.getElementById("notes");
    const mealTable = document.getElementById("mealTable");
    const routeMap = document.getElementById("routeMap");
    const baseRoute = document.getElementById("baseRoute");
    const routeBg = document.getElementById("routeBg");
    const routeLine = document.getElementById("routeLine");
    const markers = document.getElementById("markers");

    let currentIndex = 0;

    function p(name) { return locations[name]; }

    function pathFor(route) {
      return route.map((name, i) => {
        const pt = p(name);
        return `${i === 0 ? "M" : "L"} ${pt.x} ${pt.y}`;
      }).join(" ");
    }

    function setView(route, full) {
      if (full) {
        routeMap.setAttribute("viewBox", "80 80 740 470");
        return;
      }
      if (route.length <= 1) {
        const pt = p(route[0]);
        routeMap.setAttribute("viewBox", `${pt.x - 190} ${pt.y - 115} 380 280`);
        return;
      }
      const pts = route.map(p);
      const minX = Math.min(...pts.map(pt => pt.x));
      const maxX = Math.max(...pts.map(pt => pt.x));
      const minY = Math.min(...pts.map(pt => pt.y));
      const maxY = Math.max(...pts.map(pt => pt.y));
      const padX = Math.max(95, (maxX - minX) * 0.35);
      const padY = Math.max(95, (maxY - minY) * 0.55);
      routeMap.setAttribute("viewBox", `${minX - padX} ${minY - padY + 50} ${(maxX - minX) + 2 * padX} ${(maxY - minY) + 2 * padY}`);
    }

    function renderChips(route) {
      chips.innerHTML = route.map((name, i) => `<span class="chip"><span class="num">${i + 1}</span><span>${p(name).label}</span></span>`).join("");
    }

    function drawRoute(route, options = { full: false }) {
      const full = options.full;
      const displayRoute = full ? fullRoute : route;
      setView(displayRoute, full);
      baseRoute.setAttribute("d", pathFor(fullRoute));
      routeBg.setAttribute("d", pathFor(displayRoute));
      routeLine.setAttribute("d", pathFor(displayRoute));
      markers.innerHTML = "";

      if (full) {
        chips.innerHTML = "";
        displayRoute.forEach(name => {
          const pt = p(name);
          markers.innerHTML += `<circle class="full-dot" cx="${pt.x}" cy="${pt.y}" r="8"></circle>`;
        });
        return;
      }

      renderChips(displayRoute);
      const active = new Set(displayRoute);
      displayRoute.forEach((name, i) => {
        const pt = p(name);
        const cls = (i === 0 || i === displayRoute.length - 1) ? "marker-main" : "marker-mid";
        markers.innerHTML += `<circle class="${cls}" cx="${pt.x}" cy="${pt.y}" r="24"></circle><text class="marker-text" x="${pt.x}" y="${pt.y + 1}">${i + 1}</text>`;
      });
      fullRoute.forEach(name => {
        if (active.has(name)) return;
        const pt = p(name);
        markers.innerHTML += `<circle class="ghost-dot" cx="${pt.x}" cy="${pt.y}" r="10"></circle>`;
      });
    }

    function renderDayList() {
      dayList.innerHTML = days.map((day, i) => `
        <button class="day-card ${i === currentIndex ? "active" : ""}" data-index="${i}">
          <div class="day-row"><div class="date">${day.date}</div><div class="country">${day.country}</div></div>
          <div class="day-title">${day.title}</div>
          <ul class="mini">${day.bullets.map(b => `<li>${b}</li>`).join("")}</ul>
        </button>
      `).join("");
      document.querySelectorAll(".day-card").forEach(btn => {
        btn.addEventListener("click", () => {
          currentIndex = Number(btn.dataset.index);
          homeBtn.classList.remove("active");
          document.querySelectorAll(".day-card").forEach(card => card.classList.remove("active"));
          btn.classList.add("active");
          renderDay(days[currentIndex]);
        });
      });
    }

    function renderDay(day) {
      drawRoute(day.route, { full: false });
      mapTitle.textContent = `${day.date}: ${day.title}`;
      mapText.textContent = day.routeText;
      detailTitle.textContent = `${day.date} — ${day.title}`;
      detailMeta.textContent = day.meta;
      timeline.innerHTML = day.timeline.map(([t, text]) => `<li><span class="time">${t}</span><span>${text}</span></li>`).join("");
      notes.innerHTML = day.notes.map(note => `<li>${note}</li>`).join("");
      mealTable.innerHTML = `<thead><tr><th>Item</th><th>Details</th></tr></thead><tbody>${day.meals.map(([a,b]) => `<tr><td>${a}</td><td>${b}</td></tr>`).join("")}</tbody>`;
    }

    homeBtn.addEventListener("click", () => {
      homeBtn.classList.add("active");
      drawRoute(fullRoute, { full: true });
      mapTitle.textContent = "Full route overview";
      mapText.textContent = "";
    });

    renderDayList();
    drawRoute(fullRoute, { full: true });
    mapTitle.textContent = "Full route overview";
    mapText.textContent = "";
    renderDay(days[currentIndex]);
  </script>
</body>
</html>
